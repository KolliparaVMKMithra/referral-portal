<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Referral Tracker Portal | Track & Organize Referrals</title>
  <meta name="description" content="A premium, simple, and clean personal dashboard to track job referrals, referrers, and referral messages across different companies.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <!-- App Header -->
    <header class="app-header">
      <div class="logo-section">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
          </svg>
        </div>
        <div class="logo-text">
          <h1>Referral Tracker</h1>
          <p>Optimize your pipeline</p>
        </div>
      </div>
      
      <div class="header-actions">
        <button class="btn btn-secondary" id="btnExport" title="Export Referrals to JSON">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
          Export
        </button>
        <button class="btn btn-secondary" id="btnImport" title="Import Referrals from JSON">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          Import
        </button>
        <input type="file" id="importFileInput" accept=".json" style="display: none;">
        
        <button class="btn btn-primary" id="btnNewReferral">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Add Referral
        </button>
      </div>
    </header>

    <!-- Stats Overview -->
    <section class="stats-grid" aria-label="Referral Statistics">
      <div class="stat-card stat-total">
        <span class="stat-label">Total Referrals</span>
        <span class="stat-value" id="statTotalCount">0</span>
      </div>
      <div class="stat-card stat-active">
        <span class="stat-label">Companies</span>
        <span class="stat-value" id="statCompaniesCount">0</span>
      </div>
      <div class="stat-card stat-secured">
        <span class="stat-label">Secured</span>
        <span class="stat-value" id="statSecuredCount">0</span>
      </div>
      <div class="stat-card stat-applied">
        <span class="stat-label">Applied</span>
        <span class="stat-value" id="statAppliedCount">0</span>
      </div>
      <div class="stat-card stat-interview">
        <span class="stat-label">Interviewing</span>
        <span class="stat-value" id="statInterviewingCount">0</span>
      </div>
      <div class="stat-card stat-offer">
        <span class="stat-label">Offers</span>
        <span class="stat-value" id="statOffersCount">0</span>
      </div>
    </section>

    <!-- Toolbar & Filters -->
    <div class="toolbar">
      <div class="search-filter-wrapper">
        <div class="search-box">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
          </svg>
          <input type="text" id="txtSearch" class="input-field" placeholder="Search by company, employee, message...">
        </div>
        
        <select id="selStatusFilter" class="select-field" aria-label="Filter by Status">
          <option value="">All Statuses</option>
          <option value="contacted">Contacted</option>
          <option value="secured">Referral Secured</option>
          <option value="applied">Applied</option>
          <option value="interviewing">Interviewing</option>
          <option value="offer">Offer Received</option>
          <option value="rejected">Rejected</option>
        </select>
        
        <select id="selCompanyFilter" class="select-field" aria-label="Filter by Company">
          <option value="">All Companies</option>
        </select>
      </div>
    </div>

    <!-- Referrals Grid -->
    <main class="referral-grid" id="referralsGridContainer">
      <!-- Empty State -->
      <div class="empty-state" id="emptyStateEl">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/>
          </svg>
        </div>
        <h3>No referrals tracked yet</h3>
        <p>Start organizing your network. Click the button above to add your first employee referral.</p>
        <button class="btn btn-primary" id="btnEmptyStateAdd">Add Your First Referral</button>
      </div>
    </main>
  </div>

  <!-- Referral Modal Form -->
  <div class="modal-overlay" id="referralModal">
    <div class="modal-container">
      <header class="modal-header">
        <h2 class="modal-title" id="modalTitleText">Add New Referral</h2>
        <button class="modal-close" id="btnCancelModal" aria-label="Close modal">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </header>
      <form id="referralForm">
        <input type="hidden" id="txtReferralId">
        <div class="modal-body">
          <div class="form-group">
            <label for="txtCompany" class="form-label">Company Name *</label>
            <input type="text" id="txtCompany" class="form-input" placeholder="e.g. Google, Stripe" required>
          </div>
          
          <div class="form-group">
            <label for="txtEmployeeName" class="form-label">Employee Name (Referrer) *</label>
            <input type="text" id="txtEmployeeName" class="form-input" placeholder="e.g. Sarah Jenkins" required>
          </div>
          
          <div class="form-group">
            <label for="txtLinkedIn" class="form-label">LinkedIn Profile URL</label>
            <input type="url" id="txtLinkedIn" class="form-input" placeholder="e.g. https://www.linkedin.com/in/username">
          </div>
          
          <div class="form-group">
            <label for="selStatus" class="form-label">Referral Status</label>
            <select id="selStatus" class="form-select">
              <option value="contacted">Contacted</option>
              <option value="secured">Referral Secured</option>
              <option value="applied">Applied</option>
              <option value="interviewing">Interviewing</option>
              <option value="offer">Offer Received</option>
              <option value="rejected">Rejected</option>
            </select>
          </div>
          
          <div class="form-group">
            <label for="txtMessage" class="form-label">Referral Message *</label>
            <textarea id="txtMessage" class="form-textarea" placeholder="Write the message sent, or templates/communication log..." required></textarea>
          </div>
        </div>
        <footer class="modal-footer">
          <button type="button" class="btn btn-secondary" id="btnFormCancel">Cancel</button>
          <button type="submit" class="btn btn-primary" id="btnFormSubmit">Save Referral</button>
        </footer>
      </form>
    </div>
  </div>

  <!-- Toast Notification Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="app.js"></script>
</body>
</html>
